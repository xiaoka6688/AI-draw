<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <title>小卡AI绘图</title>
  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-card: rgba(20, 20, 20, 0.85);
      --glass: rgba(30, 30, 30, 0.9);
      --glass-border: rgba(255, 255, 255, 0.06);
      --accent: #ef4444;
      --accent-glow: rgba(239, 68, 68, 0.4);
      --text-main: #f0f0f0;
      --text-muted: #888;
      --text-subtle: #555;
      --radius: 12px;
      --radius-lg: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    @font-face {
      font-family: 'Playfair Display';
      src: url('https://fonts.gstatic.com/s/playfairdisplay/v37/nuFvD-vYSZviVYUb_rj3ij__anPXDTnCjmHKM4nYO7KN_qiTbtbK-F2rA0s.woff2') format('woff2');
      font-weight: 400 900;
      font-display: swap;
    }

    body {
      margin: 0;
      color: var(--text-main);
      background-color: var(--bg-dark);
      background-image:
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.015) 0px, rgba(255, 255, 255, 0.015) 1px, transparent 1px, transparent 40px);
      background-attachment: fixed;
      font-family: "PingFang SC", "Helvetica Neue", Helvetica, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    @media (max-width: 900px) {
      body {
        height: auto;
        overflow: auto;
        padding-bottom: 60px;
      }
    }

    .app-container {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 24px;
      height: 100%;
      max-width: 1800px;
      margin: 0 auto;
      padding: 24px;
    }

    @media (max-width: 900px) {
      .app-container {
        grid-template-columns: 1fr;
        height: auto;
        display: block;
        padding: 16px;
      }
    }

    .panel-control {
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      height: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    @media (max-width: 900px) {
      .panel-control {
        height: auto;
        margin-bottom: 20px;
      }
    }

    header {
      margin-bottom: 8px;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 16px;
      position: relative;
    }

    header::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      font-family: 'Playfair Display', serif;
      background: linear-gradient(135deg, #fff 0%, #ddd 50%, #fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 200%;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: -200% 0; }
      50% { background-position: 200% 0; }
    }

    .author-info {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .author-highlight {
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
      transition: color 0.3s;
    }

    .author-highlight:hover {
      color: #ff6b6b;
    }

    label {
      display: block;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      font-weight: 500;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--glass-border);
      color: #fff;
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
    }

    select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      padding-right: 36px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9' viewBox='0 0 14 9' fill='none'><path d='M2 2L7 7L12 2' stroke='%23888' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 14px center;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
      line-height: 1.6;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12), 0 0 20px rgba(239, 68, 68, 0.08);
      background-color: rgba(0, 0, 0, 0.5);
    }

    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .config-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
    }

    .inline-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .inline-row label {
      margin-bottom: 0;
      flex-shrink: 0;
      width: 76px;
      text-transform: none;
      letter-spacing: normal;
    }

    .inline-row select {
      flex: 1;
    }

    .drop-zone {
      border: 1px dashed var(--glass-border);
      background: rgba(0, 0, 0, 0.3);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.03) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .drop-zone:hover {
      border-color: var(--accent);
      background: rgba(239, 68, 68, 0.05);
      transform: translateY(-1px);
    }

    .drop-zone:hover::before {
      opacity: 1;
    }

    .drop-text {
      font-size: 14px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .thumbs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .thumb {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      border: 2px solid var(--glass-border);
      transition: all 0.2s;
    }

    .thumb:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumb .del {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }

    .thumb:hover .del {
      opacity: 1;
    }

    .btn-main {
      background: linear-gradient(135deg, var(--accent) 0%, #dc2626 100%);
      color: #fff;
      border: none;
      flex-shrink: 0;
      height: 50px;
      min-height: 50px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.35);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(239, 68, 68, 0.45);
      filter: brightness(1.05);
    }

    .btn-main:active {
      transform: translateY(0);
    }

    .btn-main[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-sm {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-sm:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .key-section {
      background: rgba(0, 0, 0, 0.3);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--glass-border);
    }

    .key-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .key-label::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .key-input-row {
      display: flex;
      gap: 8px;
    }

    .key-input-row input {
      flex: 1;
      height: 40px;
    }

    .key-input-row .btn-sm {
      flex-shrink: 0;
      height: 40px;
      padding: 0 18px;
    }

    .status-bar {
      height: 44px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      font-size: 14px;
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
      transition: all 0.3s;
    }

    .status-bar.processing {
      color: var(--accent);
      border-color: rgba(239, 68, 68, 0.3);
      background: rgba(239, 68, 68, 0.05);
    }

    .status-bar.success {
      color: #10b981;
      border-color: rgba(16, 185, 129, 0.3);
      background: rgba(16, 185, 129, 0.05);
    }

    .status-bar.error {
      color: #ef4444;
      border-color: rgba(239, 68, 68, 0.3);
      background: rgba(239, 68, 68, 0.05);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .spinner.active {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .panel-gallery {
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .panel-gallery::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.02) 0%, transparent 50%, rgba(239, 68, 68, 0.01) 100%);
      pointer-events: none;
    }

    .gallery-empty {
      text-align: center;
      color: var(--text-muted);
    }

    .gallery-empty h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      margin-bottom: 12px;
      opacity: 0.8;
    }

    .gallery-empty p {
      font-size: 14px;
      opacity: 0.6;
    }

    .gallery-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.5s ease-out;
    }

    .gallery-actions {
      position: absolute;
      bottom: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .panel-gallery:hover .gallery-actions {
      opacity: 1;
    }

    .btn-download {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 10px 16px;
      color: var(--text-main);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-download:hover {
      background: rgba(239, 68, 68, 0.9);
      border-color: var(--accent);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .btn-history {
      position: fixed;
      top: 24px;
      right: 24px;
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 12px 20px;
      color: var(--text-main);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-history:hover {
      background: rgba(50, 50, 50, 0.8);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .history-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeInModal 0.2s ease-out;
    }

    @keyframes fadeInModal {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .history-modal.active {
      display: flex;
    }

    .history-content {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 1000px;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--glass-border);
    }

    .history-header h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }

    .history-actions {
      display: flex;
      gap: 12px;
    }

    .history-actions button {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .history-actions button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .history-actions button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .history-actions .btn-danger {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    .history-actions .btn-danger:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    .btn-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }

    .btn-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .history-item {
      background: rgba(0, 0, 0, 0.3);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid var(--glass-border);
      position: relative;
    }

    .history-item:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    }

    .history-item.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.3);
    }

    .history-item .checkbox {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      background: rgba(0, 0, 0, 0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .history-item:hover .checkbox,
    .history-item.selected .checkbox {
      opacity: 1;
    }

    .history-item .checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .history-item .checkbox::after {
      content: '✓';
      color: white;
      font-size: 12px;
      display: none;
    }

    .history-item .checkbox.checked::after {
      display: block;
    }

    .history-item-actions {
      position: absolute;
      bottom: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .history-item:hover .history-item-actions {
      opacity: 1;
    }

    .history-item-actions button {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.6);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .history-item-actions button:hover {
      background: rgba(239, 68, 68, 0.8);
      border-color: var(--accent);
      color: white;
    }

    .history-item img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .history-info {
      padding: 12px;
    }

    .history-prompt {
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 8px;
    }

    .history-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-subtle);
    }

    .history-pagination {
      padding: 16px 24px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pagination-info {
      color: var(--text-muted);
      font-size: 13px;
    }

    .pagination-buttons {
      display: flex;
      gap: 8px;
    }

    .pagination-buttons button {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .pagination-buttons button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .pagination-buttons button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .history-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 80px 20px;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 14px 24px;
      color: var(--text-main);
      font-size: 14px;
      z-index: 2000;
      opacity: 0;
      transition: all 0.3s;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      border-color: rgba(16, 185, 129, 0.3);
      color: #10b981;
    }

    .toast.error {
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }
  </style>
</head>

<body>
  <div class="app-container">
    <aside class="panel-control">
      <header>
        <h1>小卡AI绘图</h1>
        <div class="author-info">
          <span>国内可用 简单快捷</span>
          <span>作者: 小卡 <span class="author-highlight" onclick="copyWx()">微信: M422970338</span></span>
        </div>
      </header>

      <div>
        <label>创意描述 (Prompt)</label>
        <textarea id="prompt" placeholder="输入图片描述，支持中英文"></textarea>
      </div>

      <div class="inline-row">
        <label>模型</label>
        <select id="modelSelect">
          <option value="gpt-image-2" selected>GPT Image 2</option>
          <option value="nano-banana-pro">Nano Banana Pro</option>
        </select>
      </div>
      <div class="inline-row">
        <label>画幅比例</label>
        <select id="ratioSelect">
          <option value="auto">自动</option>
          <option value="1:1">1:1</option>
          <option value="16:9">16:9</option>
          <option value="9:16">9:16</option>
          <option value="4:3">4:3</option>
          <option value="3:4">3:4</option>
          <option value="3:2">3:2</option>
          <option value="2:3">2:3</option>
          <option value="5:4">5:4</option>
          <option value="4:5">4:5</option>
          <option value="21:9">21:9</option>
        </select>
      </div>
      <div class="inline-row">
        <label>分辨率</label>
        <select id="sizeSelect">
          <option value="1K">1K 标准</option>
          <option value="2K">2K 高清</option>
          <option value="4K" selected>4K 超清</option>
        </select>
      </div>

      <div>
        <label>参考图片或要编辑的图片（可选）</label>
        <div class="drop-zone" id="drop">
          <span class="drop-text">📷 点击或拖拽上传图片</span>
          <input id="file" type="file" accept="image/*" multiple hidden>
        </div>
        <div id="thumbs" class="thumbs"></div>
      </div>

      <div class="key-section">
        <div class="key-label">第3步：输入Key (需为小卡AI支持的API Key)</div>
        <div class="key-input-row">
          <input type="text" id="userKey" placeholder="sk-..." style="height:40px;">
          <button class="btn-sm" id="saveKey">保存</button>
          <button class="btn-sm" id="queryCredits">查询剩余</button>
        </div>
      </div>

      <div class="status-bar" id="status">就绪，点击生成开始创作</div>

      <button class="btn-main" id="go">
        <span class="spinner" id="spin"></span>
        <span id="btnText">生成</span>
      </button>
    </aside>

    <main class="panel-gallery" id="gallery">
      <div class="gallery-empty">
        <h2>等待创作</h2>
        <p>输入创意描述，点击生成按钮开始创作您的专属图片</p>
      </div>
      <div class="gallery-actions" id="galleryActions">
        <button class="btn-download" id="downloadBtn" style="display: none;">
          <span>⬇️</span> 下载图片
        </button>
      </div>
    </main>
  </div>

  <button class="btn-history" onclick="openHistory()">📋 历史记录</button>

  <div class="history-modal" id="historyModal">
    <div class="history-content">
      <div class="history-header">
        <h2>生成历史</h2>
        <div class="history-actions" id="historyActions">
          <button id="selectAllBtn" disabled>全选</button>
          <button id="downloadSelectedBtn" disabled>批量下载</button>
          <button id="deleteSelectedBtn" disabled class="btn-danger">批量删除</button>
          <button class="btn-close" onclick="closeHistory()">×</button>
        </div>
      </div>
      <div class="history-grid" id="historyGrid">
        <div class="history-empty">暂无历史记录</div>
      </div>
      <div class="history-pagination">
        <div class="pagination-info" id="paginationInfo">共 0 条记录</div>
        <div class="pagination-buttons">
          <button id="prevPage" disabled>‹</button>
          <button id="nextPage" disabled>›</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const promptEl = document.getElementById('prompt');
    const modelSelect = document.getElementById('modelSelect');
    const ratioSelect = document.getElementById('ratioSelect');
    const sizeSelect = document.getElementById('sizeSelect');
    const fileInput = document.getElementById('file');
    const dropZone = document.getElementById('drop');
    const thumbsEl = document.getElementById('thumbs');
    const userKeyInput = document.getElementById('userKey');
    const statusEl = document.getElementById('status');
    const goBtn = document.getElementById('go');
    const spinEl = document.getElementById('spin');
    const btnText = document.getElementById('btnText');
    const galleryEl = document.getElementById('gallery');
    const historyModal = document.getElementById('historyModal');
    const historyGrid = document.getElementById('historyGrid');
    const paginationInfo = document.getElementById('paginationInfo');
    const prevPageBtn = document.getElementById('prevPage');
    const nextPageBtn = document.getElementById('nextPage');
    const toastEl = document.getElementById('toast');
    const downloadBtn = document.getElementById('downloadBtn');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const downloadSelectedBtn = document.getElementById('downloadSelectedBtn');
    const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');

    let images = [];
    let currentPage = 1;
    const pageSize = 12;
    let rawFiles = [];
    let selectedIds = new Set();
    let currentImageUrl = null;

    document.addEventListener('DOMContentLoaded', () => {
      const savedKey = localStorage.getItem('nanoBananaKey');
      if (savedKey) {
        userKeyInput.value = savedKey;
      }
      loadHistory();
    });

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });

    function handleFiles(files) {
      rawFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
      thumbsEl.innerHTML = '';
      
      rawFiles.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = document.createElement('img');
          img.src = e.target.result;
          
          const thumb = document.createElement('div');
          thumb.className = 'thumb';
          thumb.appendChild(img);
          
          const delBtn = document.createElement('div');
          delBtn.className = 'del';
          delBtn.textContent = '×';
          delBtn.onclick = () => {
            rawFiles.splice(index, 1);
            thumb.remove();
          };
          thumb.appendChild(delBtn);
          
          thumbsEl.appendChild(thumb);
        };
        reader.readAsDataURL(file);
      });
    }

    document.getElementById('saveKey').addEventListener('click', () => {
      const key = userKeyInput.value.trim();
      if (key) {
        localStorage.setItem('nanoBananaKey', key);
        showToast('Key 已保存', 'success');
      }
    });

    document.getElementById('queryCredits').addEventListener('click', async () => {
      const key = userKeyInput.value.trim();
      if (!key) {
        showToast('请先输入 Key', 'error');
        return;
      }
      statusEl.textContent = '查询中...';
      statusEl.className = 'status-bar processing';
      
      try {
        const res = await fetch('https://grsai.dakka.com.cn/client/openapi/getAPIKeyCredits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apiKey: key })
        });
        
        const data = await res.json();
        if (data.code === 0 && data.data && typeof data.data.credits === 'number') {
          const credits = data.data.credits;
          const remainingPoints = credits / 10;
          statusEl.textContent = `剩余积分: ${remainingPoints}`;
          statusEl.className = 'status-bar success';
          showToast(`剩余积分: ${remainingPoints}`, 'success');
        } else {
          throw new Error(data.msg || '查询失败');
        }
      } catch (e) {
        statusEl.textContent = '查询失败';
        statusEl.className = 'status-bar error';
        showToast('查询失败: ' + e.message, 'error');
      }
      
      setTimeout(() => {
        statusEl.textContent = '就绪，点击生成开始创作';
        statusEl.className = 'status-bar';
      }, 3000);
    });

    goBtn.addEventListener('click', async () => {
      const prompt = promptEl.value.trim();
      const key = userKeyInput.value.trim();
      const model = modelSelect.value || 'gpt-image-2';
      
      if (!prompt) {
        showToast('请输入创意描述', 'error');
        return;
      }
      
      if (!key) {
        showToast('请输入 API Key', 'error');
        return;
      }

      const ratio = ratioSelect.value;
      const size = sizeSelect.value;

      goBtn.disabled = true;
      spinEl.classList.add('active');
      btnText.textContent = '生成中';
      statusEl.textContent = '正在生成，请耐心等待...';
      statusEl.className = 'status-bar processing';

      const taskId = Date.now().toString();

      try {
        let endpoint = 'https://grsai.dakka.com.cn/v1/draw/completions';
        let payload = {};

        if (model === 'nano-banana-pro') {
          endpoint = 'https://grsai.dakka.com.cn/v1/draw/nano-banana';
          payload = {
            model: model,
            prompt: prompt,
            aspectRatio: ratio === '1:1' ? '1:1' : (ratio || 'auto'),
            imageSize: size || '1K',
            webHook: "-1",
            shutProgress: false
          };
        } else {
          payload = {
            model: model,
            prompt: prompt,
            aspectRatio: ratio,
            size: size,
            webHook: "-1"
          };
        }

        if (rawFiles.length > 0) {
          const base64Url = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.readAsDataURL(rawFiles[0]);
          });
          payload.urls = [base64Url];
        }

        const res = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + key,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          let errMessage = `HTTP ${res.status}`;
          try {
            const errData = await res.json();
            if (errData.error && errData.error.message) errMessage = errData.error.message;
            else if (errData.message) errMessage = errData.message;
            else if (errData.msg) errMessage = errData.msg;
          } catch (e) {}
          throw new Error(errMessage);
        }

        const contentType = res.headers.get('content-type') || '';
        let urls = [];

        if (contentType.includes('text/event-stream') || contentType.includes('stream')) {
          const reader = res.body.getReader();
          const decoder = new TextDecoder('utf-8');
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
              const trimmed = line.trim();
              if (!trimmed) continue;

              let dataStr = trimmed;
              if (dataStr.startsWith('data:')) {
                dataStr = dataStr.slice(5).trim();
              }
              if (dataStr === '[DONE]') continue;

              try {
                const dataObj = JSON.parse(dataStr);

                if (dataObj.code && dataObj.code < 0) {
                  throw new Error(dataObj.msg || 'API Error');
                }

                if (dataObj.status === 'IN_PROGRESS' || dataObj.progress) {
                  statusEl.textContent = `正在绘制... 进度: ${dataObj.progress || '处理中'}`;
                }

                let imgUrl = dataObj.imageUrl || dataObj.url;
                if (!imgUrl && dataObj.data) {
                  if (typeof dataObj.data === 'string' && dataObj.data.startsWith('http')) {
                    imgUrl = dataObj.data;
                  } else if (dataObj.data.url) {
                    imgUrl = dataObj.data.url;
                  } else if (Array.isArray(dataObj.data) && dataObj.data[0]) {
                    imgUrl = dataObj.data[0].url || (dataObj.data[0].b64_json ? `data:image/png;base64,${dataObj.data[0].b64_json}` : null);
                  }
                }
                if (!imgUrl && typeof dataObj.result === 'string' && dataObj.result.startsWith('http')) {
                  imgUrl = dataObj.result;
                }

                if (imgUrl && !urls.includes(imgUrl)) {
                  urls.push(imgUrl);
                }
              } catch (e) {
                if (e.message && e.message.includes('API Error')) throw e;
              }
            }
          }

          if (buffer.trim()) {
            let dataStr = buffer.trim();
            if (dataStr.startsWith('data:')) dataStr = dataStr.slice(5).trim();
            if (dataStr !== '[DONE]') {
              try {
                const dataObj = JSON.parse(dataStr);
                if (dataObj.code && dataObj.code < 0) throw new Error(dataObj.msg || 'API Error');

                let imgUrl = dataObj.imageUrl || dataObj.url;
                if (!imgUrl && dataObj.data) {
                  if (typeof dataObj.data === 'string' && dataObj.data.startsWith('http')) imgUrl = dataObj.data;
                  else if (dataObj.data.url) imgUrl = dataObj.data.url;
                  else if (Array.isArray(dataObj.data) && dataObj.data[0]) imgUrl = dataObj.data[0].url || (dataObj.data[0].b64_json ? `data:image/png;base64,${dataObj.data[0].b64_json}` : null);
                }
                if (!imgUrl && typeof dataObj.result === 'string' && dataObj.result.startsWith('http')) imgUrl = dataObj.result;

                if (imgUrl && !urls.includes(imgUrl)) {
                  urls.push(imgUrl);
                }
              } catch (e) {
                if (e.message && e.message.includes('API Error')) throw e;
              }
            }
          }
        } else {
          const data = await res.json();

          if (data.code && data.code < 0) {
            throw new Error(data.msg || 'API Error');
          }

          if (data.imageUrl) urls.push(data.imageUrl);
          else if (data.url) urls.push(data.url);
          else if (data.result && typeof data.result === 'string' && data.result.startsWith('http')) urls.push(data.result);
          else if (data.data) {
            if (typeof data.data === 'string' && data.data.startsWith('http')) {
              urls.push(data.data);
            } else if (Array.isArray(data.data)) {
              urls = data.data.map(item => {
                if (item.url) return item.url;
                if (item.b64_json) return `data:image/png;base64,${item.b64_json}`;
                return null;
              }).filter(u => u);
            }
          }

          if (urls.length === 0) {
            const pollingId = data.id || data.task_id || (data.data && data.data.id);
            if (pollingId) {
              statusEl.textContent = `任务已提交，正在等待结果...`;
              
              let pollCount = 0;
              const maxPolls = 150;
              const pollInterval = 2000;

              const pollTimer = setInterval(async () => {
                pollCount++;
                try {
                  const pollRes = await fetch('https://grsai.dakka.com.cn/v1/draw/result', {
                    method: 'POST',
                    headers: {
                      'Authorization': 'Bearer ' + key,
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ id: pollingId })
                  });

                  if (!pollRes.ok) throw new Error(`HTTP ${pollRes.status}`);

                  const pollData = await pollRes.json();
                  if (pollData.code && pollData.code < 0) {
                    clearInterval(pollTimer);
                    throw new Error(pollData.msg || 'API Error');
                  }

                  const targetData = pollData.data || pollData;
                  const progress = targetData.progress || pollData.progress;
                  const status = targetData.status || pollData.status;

                  if (progress !== undefined && status !== 'SUCCESS' && status !== 'succeeded') {
                    statusEl.textContent = `正在绘制... 进度: ${progress}%`;
                  }

                  let imgUrl = null;
                  if (targetData.results && targetData.results[0] && targetData.results[0].url) {
                    imgUrl = targetData.results[0].url;
                  } else {
                    imgUrl = targetData.imageUrl || targetData.url || targetData.image_url;
                  }

                  if (imgUrl) {
                    clearInterval(pollTimer);
                    urls = [imgUrl];
                    processResults();
                  } else if (pollCount >= maxPolls) {
                    clearInterval(pollTimer);
                    throw new Error('轮询超时');
                  }
                } catch (e) {
                  clearInterval(pollTimer);
                  handleError(e.message);
                }
              }, pollInterval);
              return;
            }
          }
        }

        processResults();

        function processResults() {
          if (urls.length > 0) {
            displayImage(urls[0]);
            saveToHistory(prompt, model, ratio, size, urls[0]);
            statusEl.textContent = '生成完成';
            statusEl.className = 'status-bar success';
            showToast('生成成功', 'success');
          } else {
            throw new Error('未能获取到图片');
          }
          
          cleanup();
        }

      } catch (e) {
        handleError(e.message);
      }

      function handleError(message) {
        statusEl.textContent = '生成失败';
        statusEl.className = 'status-bar error';
        showToast('生成失败: ' + message, 'error');
        cleanup();
      }

      function cleanup() {
        spinEl.classList.remove('active');
        btnText.textContent = '生成';
        goBtn.disabled = false;
        
        setTimeout(() => {
          statusEl.textContent = '就绪，点击生成开始创作';
          statusEl.className = 'status-bar';
        }, 3000);
      }
    });

    function displayImage(url) {
      currentImageUrl = url;
      galleryEl.innerHTML = `<img src="${url}" class="gallery-image" alt="生成的图片">`;
      downloadBtn.style.display = 'flex';
    }

    downloadBtn.addEventListener('click', async () => {
      if (!currentImageUrl) return;
      
      try {
        const res = await fetch(currentImageUrl);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `nano-banana-${Date.now()}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('图片已下载', 'success');
      } catch (e) {
        showToast('下载失败: ' + e.message, 'error');
      }
    });

    function saveToHistory(prompt, model, ratio, size, imageUrl) {
      const record = {
        id: Date.now(),
        prompt,
        model,
        ratio,
        size,
        imageUrl,
        timestamp: new Date().toLocaleString('zh-CN')
      };
      
      const history = JSON.parse(localStorage.getItem('nanoBananaHistory') || '[]');
      history.unshift(record);
      localStorage.setItem('nanoBananaHistory', JSON.stringify(history.slice(0, 100)));
      loadHistory();
    }

    function loadHistory() {
      const history = JSON.parse(localStorage.getItem('nanoBananaHistory') || '[]');
      images = history;
      
      if (images.length === 0) {
        historyGrid.innerHTML = '<div class="history-empty">暂无历史记录</div>';
        paginationInfo.textContent = '共 0 条记录';
        prevPageBtn.disabled = true;
        nextPageBtn.disabled = true;
        updateSelectionButtons();
        return;
      }

      const totalPages = Math.ceil(images.length / pageSize);
      paginationInfo.textContent = `共 ${images.length} 条记录 · 第 ${currentPage}/${totalPages} 页`;
      
      prevPageBtn.disabled = currentPage <= 1;
      nextPageBtn.disabled = currentPage >= totalPages;

      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageItems = images.slice(start, end);

      historyGrid.innerHTML = pageItems.map(item => {
        const isSelected = selectedIds.has(item.id);
        return `
          <div class="history-item ${isSelected ? 'selected' : ''}" data-id="${item.id}">
            <div class="checkbox ${isSelected ? 'checked' : ''}" onclick="toggleSelect(${item.id}, event)"></div>
            <img src="${item.imageUrl}" alt="历史图片" onerror="this.style.display='none';">
            <div class="history-info">
              <div class="history-prompt">${item.prompt}</div>
              <div class="history-meta">
                <span>${item.model}</span>
                <span>${item.timestamp}</span>
              </div>
            </div>
            <div class="history-item-actions">
              <button onclick="downloadSingle(${item.id}, event)">⬇️</button>
              <button onclick="deleteSingle(${item.id}, event)">🗑️</button>
            </div>
          </div>
        `;
      }).join('');
      
      updateSelectionButtons();
    }

    function toggleSelect(id, event) {
      event.stopPropagation();
      const el = event.target;
      const itemEl = el.closest('.history-item');
      
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
        el.classList.remove('checked');
        itemEl.classList.remove('selected');
      } else {
        selectedIds.add(id);
        el.classList.add('checked');
        itemEl.classList.add('selected');
      }
      updateSelectionButtons();
    }

    function updateSelectionButtons() {
      const hasSelection = selectedIds.size > 0;
      const hasHistory = images.length > 0;
      
      selectAllBtn.disabled = !hasHistory;
      downloadSelectedBtn.disabled = !hasSelection;
      deleteSelectedBtn.disabled = !hasSelection;
      
      selectAllBtn.textContent = selectedIds.size === images.length ? '取消全选' : '全选';
    }

    selectAllBtn.addEventListener('click', () => {
      if (selectedIds.size === images.length) {
        selectedIds.clear();
      } else {
        images.forEach(item => selectedIds.add(item.id));
      }
      loadHistory();
    });

    async function downloadSingle(id, event) {
      event.stopPropagation();
      const item = images.find(i => i.id === id);
      if (!item) return;
      
      try {
        const res = await fetch(item.imageUrl);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `nano-banana-${id}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('图片已下载', 'success');
      } catch (e) {
        showToast('下载失败: ' + e.message, 'error');
      }
    }

    function deleteSingle(id, event) {
      event.stopPropagation();
      if (!confirm('确定要删除这条记录吗？')) return;
      
      let history = JSON.parse(localStorage.getItem('nanoBananaHistory') || '[]');
      history = history.filter(item => item.id !== id);
      localStorage.setItem('nanoBananaHistory', JSON.stringify(history));
      selectedIds.delete(id);
      loadHistory();
      showToast('已删除', 'success');
    }

    downloadSelectedBtn.addEventListener('click', async () => {
      const selectedItems = images.filter(item => selectedIds.has(item.id));
      if (selectedItems.length === 0) return;
      
      showToast(`正在下载 ${selectedItems.length} 张图片...`, 'info');
      
      let successCount = 0;
      for (const item of selectedItems) {
        try {
          const res = await fetch(item.imageUrl);
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `nano-banana-${item.id}.png`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          successCount++;
          await new Promise(r => setTimeout(r, 500));
        } catch (e) {
          console.error('下载失败:', e);
        }
      }
      
      showToast(`成功下载 ${successCount}/${selectedItems.length} 张图片`, successCount === selectedItems.length ? 'success' : 'error');
    });

    deleteSelectedBtn.addEventListener('click', () => {
      if (!confirm(`确定要删除选中的 ${selectedIds.size} 条记录吗？`)) return;
      
      let history = JSON.parse(localStorage.getItem('nanoBananaHistory') || '[]');
      history = history.filter(item => !selectedIds.has(item.id));
      localStorage.setItem('nanoBananaHistory', JSON.stringify(history));
      selectedIds.clear();
      currentPage = 1;
      loadHistory();
      showToast('已删除选中记录', 'success');
    });

    prevPageBtn.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        loadHistory();
      }
    });

    nextPageBtn.addEventListener('click', () => {
      const totalPages = Math.ceil(images.length / pageSize);
      if (currentPage < totalPages) {
        currentPage++;
        loadHistory();
      }
    });

    function openHistory() {
      currentPage = 1;
      loadHistory();
      historyModal.classList.add('active');
    }

    function closeHistory() {
      historyModal.classList.remove('active');
      selectedIds.clear();
    }

    historyModal.addEventListener('click', (e) => {
      if (e.target === historyModal) {
        closeHistory();
      }
    });

    function loadFromHistory(url) {
      displayImage(url);
      closeHistory();
    }

    function copyWx() {
      navigator.clipboard.writeText('M422970338').then(() => {
        showToast('微信号已复制', 'success');
      });
    }

    function showToast(message, type = 'info') {
      toastEl.textContent = message;
      toastEl.className = `toast ${type} show`;
      setTimeout(() => {
        toastEl.classList.remove('show');
      }, 3000);
    }
  </script>
</body>

</html>
